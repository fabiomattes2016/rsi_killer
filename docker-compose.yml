services:
  rsi-killer-binance-eth:
    image: rsi-killer-binance:latest
    container_name: rsi-killer-binance-eth
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SYMBOL: "ETH/USDT"
      LOSS: -1
      TARGET: 2
      POSICAO_MAX: 0.20
      POSICAO: 0.10
      RSI_SOBRECOMPRA: 72
      RSI_SOBREVENDA: 28
      BB_LENGTH: 20
      BB_STD: 2
      THRESHOLD: 0.020
      LEVERAGE: 10

